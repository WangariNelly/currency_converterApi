services:
  # Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ak0881216  # Consider using Docker secrets for production
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Rate Service
  rate-service:
    build: ./rateService
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Ak0881216
      SECURITY_API_KEY: SJDLKSKHJGFYAY76QO99912IAJilkkyfrtyy&&&&&vfklddlkhsghhj
      SECURITY_API_SECRET: 345678jvfdfkjknbfgui6890khjgfdddsfvnnmlkjhjgf
      SERVER_PORT: 8080  # Explicit internal port
      MANAGEMENT_SERVER_PORT: 8081

    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/rate/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main Service
  main-service:
    build: ./mainService
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Ak0881216
      RATE_SERVICE_URL: http://rate-service:8080/api/v1/rate  # Note port 8080 (container port)
      SECURITY_API_KEY: SJDLKSKHJGFYAY76QO99912IAJilkkyfrtyy&&&&&vfklddlkhsghhj
      SECURITY_API_SECRET: 345678jvfdfkjknbfgui6890khjgfdddsfvnnmlkjhjgf
    depends_on:
      rate-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
